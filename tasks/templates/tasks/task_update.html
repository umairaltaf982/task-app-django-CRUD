{% extends 'tasks/base.html' %}

{% block title %}Edit Task{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-4">Update Task</h1>

<form method="POST" class="space-y-4">
    {% csrf_token %}
    
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Task Title</label>
        <input type="text" name="title" value="{{ task.title }}" required
               class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="flex items-center gap-2">
        <input type="checkbox" name="completed" id="completed" {% if task.completed %}checked{% endif %}
               class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
        <label for="completed" class="text-sm font-medium text-gray-700">Completed</label>
    </div>

    <div class="flex gap-2 pt-2">
        <button type="submit" 
                class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold transition">
            Save Changes
        </button>
        <a href="{% url 'task_list' %}" 
           class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-semibold transition">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
