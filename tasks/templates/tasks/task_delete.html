{% extends 'tasks/base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="text-center space-y-4">
    <h1 class="text-xl font-semibold text-gray-800">
        Are you sure you want to delete <span class="text-red-600">"{{ task.title }}"</span>?
    </h1>
    <p class="text-sm text-gray-500">This action cannot be undone.</p>

    <form method="POST" class="flex justify-center gap-3 pt-2">
        {% csrf_token %}
        <button type="submit" 
                class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-semibold transition">
            Yes, Delete
        </button>
        <a href="{% url 'task_list' %}" 
           class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-semibold transition">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
